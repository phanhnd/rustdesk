name: Build-Windows-2026
on:
  workflow_dispatch:

# Ép GitHub Actions sử dụng Node 24 để hết cảnh báo deprecation
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest # Sử dụng bản mới nhất của GitHub
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Kiểm tra nếu có v5 thì thay vào đây

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Dependencies (NASM, LLVM)
        run: |
          choco install nasm llvm -y
          # Thêm NASM vào PATH để Cargo tìm thấy
          echo "C:\Program Files\NASM" >> $env:GITHUB_PATH

      - name: Setup VCPKG & Libraries
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          ./bootstrap-vcpkg.bat
          ./vcpkg install libvpx:x64-windows libopus:x64-windows aom:x64-windows
          echo "VCPKG_ROOT=$((Get-Item .).FullName)" >> $env:GITHUB_ENV

      - name: Get Sciter Library
        run: |
          Invoke-WebRequest -Uri "https://github.com/c-smile/sciter-sdk/raw/master/bin.win/x64/sciter.dll" -OutFile "sciter.dll"

      - name: Build Release
        run: |
          # Build RustDesk
          cargo build --release

      - name: Package Artifacts
        run: |
          mkdir dist
          copy target/release/rustdesk.exe dist/
          copy sciter.dll dist/

      - name: Upload Zip
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-Windows-2026
          path: dist/*
