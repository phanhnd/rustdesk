name: Build RustDesk Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # 1. Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Rust
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # 3. Cache cargo (tăng tốc build)
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # 4. Setup Python (cho build.py + portable packer)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 5. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'

      # 6. Enable Windows build for Flutter
      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      # 7. Get dependencies Flutter
      - name: Flutter pub get
        run: |
          cd flutter
          flutter pub get

      # 8. Install Python dependencies (portable packer)
      - name: Install Python deps
        run: |
          cd libs/portable
          pip install -r requirements.txt

      # 9. Build (điểm QUAN TRỌNG)
      - name: Build RustDesk
        run: |
          python build.py --flutter

      # 10. Upload artifact (.exe)
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows
          path: |
            rustdesk-*-install.exe
