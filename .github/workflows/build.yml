name: Build RustDesk Windows

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install vcpkg & Set Environment
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg
          .\vcpkg\bootstrap-vcpkg.bat
          .\vcpkg\vcpkg integrate install
          # Thiết lập biến môi trường cho các bước sau
          $vcpkgPath = "$(Get-Location)\vcpkg"
          echo "VCPKG_ROOT=$vcpkgPath" >> $env:GITHUB_ENV
          echo "$vcpkgPath" >> $env:GITHUB_PATH

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          # Thêm env VCPKG_ROOT vào cache key để đảm bảo nhất quán
          key: ${{ env.VCPKG_ROOT }}

      - name: Build RustDesk Binary
        shell: bash
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: |
          # Chạy script build chính thức của RustDesk
          python3 build.py

      - name: Create Installer (Inno Setup)
        shell: pwsh
        run: |
          # Kiểm tra file .iss trước khi chạy, nếu không thấy sẽ báo lỗi cụ thể
          if (Test-Path "flutter/windows/installer.iss") {
              iscc flutter/windows/installer.iss
          } else {
              Write-Error "Không tìm thấy file installer.iss tại flutter/windows/"
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-Windows-Package
          path: |
            target/release/rustdesk.exe
            flutter/windows/Output/*.exe
