name: Build RustDesk Windows

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      # Cài đặt vcpkg và các thư viện cần thiết cho RustDesk
      - name: Install vcpkg dependencies
        run: |
          git clone https://github.com/microsoft/vcpkg
          .\vcpkg\bootstrap-vcpkg.bat
          # RustDesk thường cần vcpkg tích hợp vào hệ thống
          .\vcpkg\vcpkg integrate install
          # Có thể cần cài thêm các lib cụ thể nếu build.py yêu cầu
          # .\vcpkg\vcpkg install libvpx:x64-windows libopus:x64-windows

      - name: Build RustDesk
        shell: bash # Sử dụng bash để lệnh python và path hoạt động ổn định hơn
        run: |
          python3 build.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-x64
          path: |
            target/release/rustdesk.exe
